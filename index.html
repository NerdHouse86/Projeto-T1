<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Instrumento de Observação Pedagógica</title>

<!-- jsPDF CDN (CORRIGIDO) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.jstyle>
body {
  font-family: Arial, sans-serif;
  background: #f4f4f4;
  padding: 20px;
}

.container {
  max-width: 1000px;
  margin: auto;
  background: #fff;
  padding: 30px;
  border-radius: 8px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h1 {
  text-align: center;
  margin-bottom: 30px;
}

.question {
  border-bottom: 1px solid #ddd;
  padding-bottom: 20px;
  margin-bottom: 25px;
}

label {
  font-weight: bold;
  display: block;
  margin-top: 10px;
}

select, textarea {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
}

textarea {
  min-height: 60px;
  resize: vertical;
}

.subrespostas label {
  font-weight: normal;
  display: block;
}

button {
  background: #0078d4;
  color: #fff;
  border: none;
  padding: 14px 22px;
  font-size: 16px;
  border-radius: 6px;
  cursor: pointer;
  display: block;
  margin: 30px auto;
}

button:hover {
  background: #005fa3;
}

.feedback {
  text-align: center;
  color: green;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
<h1>Instrumento de Observação Pedagógica</h1>

<form id="formulario"></form>

<button type="button" onclick="gerarPDF()">Salvar PDF</button>
<div class="feedback" id="feedback"></div>
</div>

<script>
// ============================
// PERGUNTAS
// ============================
const perguntas = [
  "Objetivo da aula",
  "Coerência pedagógica",
  "Clareza do propósito",
  "Uso de recursos didáticos",
  "Adaptação dos recursos",
  "Conexão recurso–objetivo",
  "Segurança na explicação",
  "Aprofundamento conceitual",
  "Domínio do conteúdo",
  "Verificação da aprendizagem",
  "Qualidade das perguntas",
  "Ausência de verificação",
  "Ritmo da aula",
  "Flexibilidade pedagógica",
  "Estrutura didática",
  "Gestão do tempo",
  "Engajamento dos alunos",
  "Momentos de desengajamento",
  "Gestão de conflitos",
  "Feedback pedagógico"
];

// ============================
// RESPOSTAS PRINCIPAIS
// ============================
const respostasPrincipais = [
  "✅ Evidência positiva observada",
  "⚖️ Evidência parcialmente observada",
  "❌ Evidência não observada",
  "🚫 Não foi possível observar"
];

// ============================
// SUB-RESPOSTAS POR PERGUNTA
// ============================
const subRespostasPorPergunta = {
  0: ["Objetivo claro", "Objetivo retomado", "Objetivo contextualizado", "Objetivo escrito", "Objetivo verbalizado"],
  1: ["Atividades alinhadas", "Avaliação coerente", "Sequência lógica", "Planejamento evidente", "Fluxo consistente"],
  2: ["Propósito explicado", "Finalidade compreendida", "Contextualização inicial", "Expectativas claras", "Sentido da atividade"],
  3: ["Uso de slides", "Uso do quadro", "Material impresso", "Tecnologia educacional", "Recursos variados"],
  4: ["Adaptação ao ritmo", "Mudança de estratégia", "Flexibilidade", "Ajustes pedagógicos", "Sensibilidade à turma"],
  5: ["Recurso alinhado ao conteúdo", "Tecnologia com sentido", "Uso pedagógico", "Mediação ativa", "Recurso como meio"],
  6: ["Explicação clara", "Exemplos eficazes", "Linguagem acessível", "Confiança conceitual", "Domínio do tema"],
  7: ["Aprofundamento adequado", "Exploração conceitual", "Ampliação do conteúdo", "Resposta às dúvidas", "Conexões teóricas"],
  8: ["Segurança conceitual", "Domínio curricular", "Ausência de erros", "Conexões com outros conteúdos", "Fluidez"],
  9: ["Perguntas diagnósticas", "Acompanhamento individual", "Registros escritos", "Discussão coletiva", "Correção dialogada"],
  10:["Perguntas abertas", "Perguntas reflexivas", "Justificativas solicitadas", "Exploração das respostas", "Mediação das falas"],
  11:["Nenhuma checagem", "Ausência de perguntas", "Sem acompanhamento", "Sem devolutivas", "Postura expositiva"],
  12:["Ritmo adequado", "Pausas para dúvidas", "Tempo ajustado", "Flexibilidade temporal", "Atenção à turma"],
  13:["Mudança de estratégia", "Reexplicação", "Nova abordagem", "Ajuste didático", "Escuta ativa"],
  14:["Início estruturado", "Desenvolvimento organizado", "Fechamento claro", "Encadeamento lógico", "Síntese final"],
  15:["Tempo bem distribuído", "Atividades concluídas", "Correção realizada", "Planejamento executado", "Gestão eficaz"],
  16:["Participação ativa", "Interação entre alunos", "Discussões produtivas", "Interesse visível", "Motivação"],
  17:["Dispersão", "Tarefas pouco significativas", "Explicação longa", "Pouca interação", "Baixo desafio"],
  18:["Diálogo respeitoso", "Mediação adequada", "Postura acolhedora", "Controle emocional", "Orientação clara"],
  19:["Feedback construtivo", "Orientações claras", "Valorização dos alunos", "Devolutiva pedagógica", "Reconhecimento"]
};

// ============================
// CONSTRUIR FORMULÁRIO
// ============================
const form = document.getElementById("formulario");

perguntas.forEach((pergunta, index) => {
  const div = document.createElement("div");
  div.className = "question";

  const subs = subRespostasPorPergunta[index] || [];
  let subsHtml = "";

  subs.forEach(sub => {
    subsHtml += `
      <label>
        <input type="checkbox" name="sub_${index}" value="${sub}" disabled>
        ${sub}
      </label>`;
  });

  div.innerHTML = `
    <label>${index + 1}. ${pergunta}</label>

    <label>Resposta principal</label>
    <select onchange="ativarSub(${index})">
      <option value="">Selecione</option>
      ${respostasPrincipais.map(r => `<option>${r}</option>`).join("")}
    </select>

    <div class="subrespostas">
      <label>Sub-respostas (marque quantas quiser)</label>
      ${subsHtml}
    </div>

    <label>Observações</label>
    <textarea></textarea>
  `;

  form.appendChild(div);
});

function ativarSub(index) {
  document.querySelectorAll(`input[name="sub_${index}"]`)
    .forEach(cb => cb.disabled = false);
}

// ============================
// GERAR PDF
// ============================
function gerarPDF() {
  const selects = document.querySelectorAll("select");
  const textareas = document.querySelectorAll("textarea");

  for (let i = 0; i < selects.length; i++) {
    const subs = document.querySelectorAll(`input[name="sub_${i}"]:checked`);
    if (!selects[i].value || subs.length === 0) {
      alert("Preencha todas as respostas e selecione ao menos uma sub-resposta.");
      return;
    }
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  let y = 10;

  perguntas.forEach((p, i) => {
    doc.setFontSize(12);
    doc.text(`${i + 1}. ${p}`, 10, y); y += 6;

    doc.setFontSize(10);
    doc.text(`Resposta: ${selects[i].value}`, 10, y); y += 6;

    const subs = [...document.querySelectorAll(`input[name="sub_${i}"]:checked`)]
      .map(cb => cb.value).join(", ");

    doc.text(`Sub-respostas: ${subs}`, 10, y); y += 6;

    if (textareas[i].value) {
      doc.text(`Observações: ${textareas[i].value}`, 10, y); y += 6;
    }

    y += 6;
    if (y > 270) { doc.addPage(); y = 10; }
  });

  doc.save("observacao_pedagogica.pdf");
  document.getElementById("feedback").textContent = "✅ PDF gerado com sucesso!";
}
</script>

</body>
</html>
