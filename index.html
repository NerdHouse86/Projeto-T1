<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Instrumento de Observação Pedagógica</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f4f4;
  padding: 20px;
}

.container {
  max-width: 1000px;
  margin: auto;
  background: #fff;
  padding: 30px;
  border-radius: 8px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h1 {
  text-align: center;
  margin-bottom: 30px;
}

.question {
  border-bottom: 1px solid #ddd;
  padding-bottom: 20px;
  margin-bottom: 25px;
}

label {
  font-weight: bold;
  display: block;
  margin-top: 10px;
}

select, textarea {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
}

textarea {
  min-height: 60px;
}

.subrespostas {
  margin-top: 10px;
}

.subrespostas label {
  font-weight: normal;
  display: block;
}

button {
  background: #0078d4;
  color: white;
  border: none;
  padding: 14px 22px;
  font-size: 16px;
  border-radius: 6px;
  cursor: pointer;
  display: block;
  margin: 30px auto;
}

button:hover {
  background: #005fa3;
}

.feedback {
  text-align: center;
  color: green;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
<h1>Instrumento de Observação Pedagógica</h1>

<form id="formulario"></form>

<button type="button" onclick="gerarPDF()">Salvar PDF</button>
<div class="feedback" id="feedback"></div>
</div>

<script>
// ==========================
// CONFIGURAÇÕES EDITÁVEIS
// ==========================

const perguntas = [
  "Objetivo da aula",
  "Coerência pedagógica",
  "Clareza do propósito",
  "Uso de recursos didáticos",
  "Adaptação dos recursos",
  "Conexão recurso–objetivo",
  "Segurança na explicação",
  "Aprofundamento conceitual",
  "Domínio do conteúdo",
  "Verificação da aprendizagem",
  "Qualidade das perguntas",
  "Ausência de verificação",
  "Ritmo da aula",
  "Flexibilidade pedagógica",
  "Estrutura didática",
  "Gestão do tempo",
  "Engajamento dos alunos",
  "Momentos de desengajamento",
  "Gestão de conflitos",
  "Feedback pedagógico"
];

const respostasPrincipais = [
  "✅ Evidência positiva observada",
  "⚖️ Evidência parcialmente observada",
  "❌ Evidência não observada",
  "🚫 Não foi possível observar"
];

// ✅ EDITE AS SUB-RESPOSTAS AQUI
const subRespostasPadrao = [
  "Sub-resposta 1",
  "Sub-resposta 2",
  "Sub-resposta 3",
  "Sub-resposta 4",
  "Sub-resposta 5",
  "Sub-resposta 6",
  "Sub-resposta 7",
  "Sub-resposta 8",
  "Sub-resposta 9",
  "Sub-resposta 10",
  "Sub-resposta 11",
  "Sub-resposta 12",
  "Sub-resposta 13",
  "Sub-resposta 14",
  "Sub-resposta 15",
  "Sub-resposta 16",
  "Sub-resposta 17",
  "Sub-resposta 18",
  "Sub-resposta 19",
  "Sub-resposta 20"
];

// ==========================
// CRIAÇÃO DO FORMULÁRIO
// ==========================

const form = document.getElementById("formulario");

perguntas.forEach((pergunta, index) => {
  const div = document.createElement("div");
  div.className = "question";

  let subHtml = "";
  subRespostasPadrao.forEach((sub, i) => {
    subHtml += `
      <label>
        <input type="checkbox" name="sub_${index}" value="${sub}" disabled>
        ${sub}
      </label>`;
  });

  div.innerHTML = `
    <label>${index + 1}. ${pergunta}</label>

    <label>Resposta principal</label>
    <select required onchange="ativarSubrespostas(${index})">
      <option value="">Selecione</option>
      ${respostasPrincipais.map(r => `<option>${r}</option>`).join("")}
    </select>

    <div class="subrespostas">
      <label>Sub-respostas (pode marcar mais de uma)</label>
      ${subHtml}
    </div>

    <label>Observações</label>
    <textarea placeholder="Observações..."></textarea>
  `;

  form.appendChild(div);
});

// ==========================
// FUNÇÕES
// ==========================

function ativarSubrespostas(index) {
  document.querySelectorAll(`input[name="sub_${index}"]`)
    .forEach(cb => cb.disabled = false);
}

function gerarPDF() {
  const selects = document.querySelectorAll("select");
  const textareas = document.querySelectorAll("textarea");

  for (let i = 0; i < selects.length; i++) {
    const subChecks = document.querySelectorAll(`input[name="sub_${i}"]:checked`);
    if (!selects[i].value || subChecks.length === 0) {
      alert("Responda todas as perguntas e selecione ao menos uma sub-resposta.");
      return;
    }
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  let y = 10;

  perguntas.forEach((p, i) => {
    doc.setFontSize(12);
    doc.text(`${i + 1}. ${p}`, 10, y); y += 6;

    doc.setFontSize(10);
    doc.text(`Resposta: ${selects[i].value}`, 10, y); y += 6;

    const subs = [...document.querySelectorAll(`input[name="sub_${i}"]:checked`)]
      .map(cb => cb.value)
      .join(", ");

    doc.text(`Sub-respostas: ${subs}`, 10, y); y += 6;

    if (textareas[i].value) {
      doc.text(`Observações: ${textareas[i].value}`, 10, y); y += 6;
    }

    y += 6;
    if (y > 270) {
