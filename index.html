<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Instrumento de Observação Pedagógica</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f4f4;
  padding: 20px;
}

.container {
  max-width: 1000px;
  background: #fff;
  margin: auto;
  padding: 30px;
  border-radius: 8px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h1 {
  text-align: center;
  margin-bottom: 30px;
}

.question {
  border-bottom: 1px solid #ddd;
  padding-bottom: 20px;
  margin-bottom: 25px;
}

label {
  font-weight: bold;
  margin-top: 10px;
  display: block;
}

select, textarea {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
}

textarea {
  min-height: 60px;
  resize: vertical;
}

button {
  background: #0078d4;
  color: white;
  border: none;
  padding: 14px 22px;
  font-size: 16px;
  border-radius: 6px;
  cursor: pointer;
  margin: 20px auto;
  display: block;
}

button:hover {
  background: #005fa3;
}

.feedback {
  text-align: center;
  color: green;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
<h1>Instrumento de Observação Pedagógica</h1>

<form id="formulario"></form>

<button type="button" onclick="gerarPDF()">Salvar PDF</button>
<div class="feedback" id="feedback"></div>
</div>

<script>
const perguntas = [
  "Objetivo da aula",
  "Coerência pedagógica",
  "Clareza do propósito",
  "Uso de recursos didáticos",
  "Adaptação dos recursos",
  "Conexão recurso–objetivo",
  "Segurança na explicação",
  "Aprofundamento conceitual",
  "Domínio do conteúdo",
  "Verificação da aprendizagem",
  "Qualidade das perguntas",
  "Ausência de verificação",
  "Ritmo da aula",
  "Flexibilidade pedagógica",
  "Estrutura didática",
  "Gestão do tempo",
  "Engajamento dos alunos",
  "Momentos de desengajamento",
  "Gestão de conflitos",
  "Feedback pedagógico"
];

const respostasPrincipais = [
  "✅ Evidência positiva observada",
  "⚖️ Evidência parcialmente observada",
  "❌ Evidência não observada",
  "🚫 Não foi possível observar"
];

const form = document.getElementById("formulario");

perguntas.forEach((textoPergunta, index) => {
  const div = document.createElement("div");
  div.className = "question";

  let subOptions = "";
  for (let i = 1; i <= 20; i++) {
    subOptions += `<option>Sub-resposta ${i}</option>`;
  }

  div.innerHTML = `
    <label>${index + 1}. ${textoPergunta}</label>

    <label>Resposta principal</label>
    <select class="resposta" required onchange="habilitarSubResposta(${index})">
      <option value="">Selecione</option>
      ${respostasPrincipais.map(r => `<option>${r}</option>`).join("")}
    </select>

    <label>Sub-resposta</label>
    <select class="subresposta" required disabled>
      <option value="">Selecione uma sub-resposta</option>
      ${subOptions}
    </select>

    <label>Observações</label>
    <textarea placeholder="Observações..."></textarea>
  `;

  form.appendChild(div);
});

function habilitarSubResposta(i) {
  const sub = document.querySelectorAll(".subresposta")[i];
  sub.disabled = false;
}

function gerarPDF() {
  const respostas = document.querySelectorAll(".resposta");
  const subrespostas = document.querySelectorAll(".subresposta");
  const observacoes = document.querySelectorAll("textarea");

  for (let i = 0; i < respostas.length; i++) {
    if (!respostas[i].value || !subrespostas[i].value) {
      alert("Por favor, selecione a resposta e a sub-resposta em todas as perguntas.");
      return;
    }
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  let y = 10;

  perguntas.forEach((p, i) => {
    doc.setFontSize(12);
    doc.text(`${i + 1}. ${p}`, 10, y);
    y += 6;

    doc.setFontSize(10);
    doc.text(`Resposta: ${respostas[i].value}`, 10, y);
    y += 6;

    doc.text(`Sub-resposta: ${subrespostas[i].value}`, 10, y);
    y += 6;

    if (observacoes[i].value) {
      doc.text(`Observações: ${observacoes[i].value}`, 10, y);
      y += 6;
    }

    y += 6;
    if (y > 270) {
      doc.addPage();
      y = 10;
    }
  });

  doc.save("observacao_pedagogica.pdf");
  document.getElementById("feedback").innerText = "✅ PDF gerado com sucesso!";
}
</script>

</body>
</html>
