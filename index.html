<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Instrumento de Observação Pedagógica</title>

<!-- jsPDF CDN CORRETO -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f4f4;
  padding: 20px;
}

.container {
  max-width: 1000px;
  margin: auto;
  background: #fff;
  padding: 30px;
  border-radius: 8px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h1 {
  text-align: center;
}

.question {
  border-bottom: 1px solid #ddd;
  padding-bottom: 20px;
  margin-bottom: 25px;
}

label {
  font-weight: bold;
  display: block;
  margin-top: 10px;
}

.subrespostas label {
  font-weight: normal;
}

select, textarea {
  width: 100%;
  padding: 8px;
}

button {
  background: #0078d4;
  color: #fff;
  border: none;
  padding: 14px 22px;
  border-radius: 6px;
  cursor: pointer;
  display: block;
  margin: 30px auto;
}

button:hover {
  background: #005fa3;
}

.feedback {
  text-align: center;
  color: green;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
<h1>Instrumento de Observação Pedagógica</h1>

<form id="formulario"></form>

<button type="button" onclick="gerarPDF()">Salvar PDF</button>
<div class="feedback" id="feedback"></div>
</div>

<script>
// ============================
// DADOS
// ============================
const perguntas = [
  "Objetivo da aula", "Coerência pedagógica", "Clareza do propósito",
  "Uso de recursos didáticos", "Adaptação dos recursos",
  "Conexão recurso–objetivo", "Segurança na explicação",
  "Aprofundamento conceitual", "Domínio do conteúdo",
  "Verificação da aprendizagem", "Qualidade das perguntas",
  "Ausência de verificação", "Ritmo da aula",
  "Flexibilidade pedagógica", "Estrutura didática",
  "Gestão do tempo", "Engajamento dos alunos",
  "Momentos de desengajamento", "Gestão de conflitos",
  "Feedback pedagógico"
];

const respostasPrincipais = [
  "✅ Evidência positiva observada",
  "⚖️ Parcialmente observada",
  "❌ Não observada",
  "🚫 Não foi possível observar"
];

// ============================
// FORMULÁRIO
// ============================
const form = document.getElementById("formulario");

perguntas.forEach((pergunta, i) => {
  const div = document.createElement("div");
  div.className = "question";

  div.innerHTML = `
    <label>${i + 1}. ${pergunta}</label>

    <select onchange="ativarSub(${i})">
      <option value="">Selecione</option>
      ${respostasPrincipais.map(r => `<option>${r}</option>`).join("")}
    </select>

    <div class="subrespostas">
      ${["Item 1","Item 2","Item 3"].map(sub => `
        <label>
          <input type="checkbox" name="sub_${i}" disabled> ${sub}
        </label>`).join("")}
    </div>

    <label>Observações</label>
    <textarea></textarea>
  `;

  form.appendChild(div);
});

function ativarSub(i) {
  document.querySelectorAll(`input[name="sub_${i}"]`)
    .forEach(cb => cb.disabled = false);
}

// ============================
// PDF
// ============================
function gerarPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const selects = document.querySelectorAll("select");
  const textareas = document.querySelectorAll("textarea");

  let y = 10;

  for (let i = 0; i < perguntas.length; i++) {
    const subs = [...document.querySelectorAll(`input[name="sub_${i}"]:checked`)];

    if (!selects[i].value) {
      alert(`Responda a pergunta ${i + 1}`);
      return;
    }

    doc.setFontSize(12);
    const texto = doc.splitTextToSize(`${i+1}. ${perguntas[i]}`, 180);
    doc.text(texto, 10, y);
    y += texto.length * 6;

    doc.setFontSize(10);

    doc.text(`Resposta: ${selects[i].value}`, 10, y);
    y += 6;

    if (subs.length > 0) {
      const listaSubs = subs.map(cb => cb.parentElement.textContent.trim()).join(", ");
      const textoSubs = doc.splitTextToSize(`Sub: ${listaSubs}`, 180);
      doc.text(textoSubs, 10, y);
      y += textoSubs.length * 6;
    }

    if (textareas[i].value) {
      const obs = doc.splitTextToSize(`Obs: ${textareas[i].value}`, 180);
      doc.text(obs, 10, y);
      y += obs.length * 6;
    }

    y += 8;

    if (y > 270) {
      doc.addPage();
      y = 10;
    }
  }

  doc.save("observacao.pdf");
  document.getElementById("feedback").textContent = "PDF gerado com sucesso!";
}
</script>

</body>
</html>
