<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Relatório de Observação de Aula | Word + E-mail</title>
<style>
  /* ========== ESTILOS GLOBAIS ========== */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --azul-profundo: #1e3c72;
    --azul-vivo: #2a5298;
    --azul-suave: #e8f0fb;
    --verde-destaque: #28a745;
    --cinza-texto: #1e293b;
    --cinza-apoio: #64748b;
    --borda-clara: #dce7f5;
    --fundo-card: #ffffff;
    --fundo-geral: #eef2f7;
  }

  body {
    font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    background: linear-gradient(145deg, #eef2f7 0%, #dee6f0 100%);
    min-height: 100vh;
    padding: 20px 16px 100px;
    color: var(--cinza-texto);
  }

  /* Barra de progresso (opcional) */
  #progressBar {
    position: fixed;
    top: 0;
    left: 0;
    height: 5px;
    width: 0%;
    background: linear-gradient(90deg, var(--azul-vivo), #5b8dee);
    transition: width 0.35s ease;
    z-index: 10000;
  }

  /* Toast para mensagens */
  #toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(25px);
    background: #1e293b;
    color: white;
    padding: 10px 24px;
    border-radius: 40px;
    font-weight: 600;
    font-size: 0.85rem;
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 9998;
    pointer-events: none;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Container principal */
  .container {
    max-width: 1180px;
    margin: 0 auto;
    background: var(--fundo-card);
    border-radius: 28px;
    padding: 32px 34px;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
  }

  h1 {
    color: var(--azul-profundo);
    font-size: 1.8rem;
    border-left: 6px solid var(--azul-vivo);
    padding-left: 20px;
    margin-bottom: 28px;
  }

  h2 {
    font-size: 1.18rem;
    font-weight: 600;
    color: var(--azul-profundo);
    border-left: 5px solid var(--azul-vivo);
    padding-left: 14px;
    margin: 0 0 12px 0;
  }

  /* Cabeçalho com campos */
  .header-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 18px;
    background: var(--azul-suave);
    padding: 24px 22px;
    border-radius: 20px;
    margin-bottom: 30px;
    border: 1px solid var(--borda-clara);
  }
  .header-grid label {
    font-weight: 700;
    font-size: 0.75rem;
    text-transform: uppercase;
    color: var(--azul-profundo);
    display: block;
    margin-bottom: 6px;
  }
  input, textarea {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid var(--borda-clara);
    border-radius: 14px;
    font-size: 0.9rem;
    font-family: inherit;
    background: white;
  }
  input:focus, textarea:focus {
    border-color: var(--azul-vivo);
    outline: none;
    box-shadow: 0 0 0 3px rgba(42,82,152,0.15);
  }

  /* Cada seção de pergunta */
  .section {
    background: #fbfdff;
    border: 1px solid var(--borda-clara);
    border-radius: 24px;
    padding: 22px 26px;
    margin-top: 28px;
  }
  .subtitulo {
    font-size: 0.8rem;
    color: var(--cinza-apoio);
    margin: -5px 0 12px 0;
    font-style: italic;
  }

  /* Botões de status (opções) */
  .btn-group {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 18px;
  }
  .btn-status {
    background: #f1f5f9;
    border: 1.5px solid #cbd5e1;
    padding: 8px 20px;
    border-radius: 40px;
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    color: #1e293b;
  }
  .btn-status:hover { background: #e2e8f0; border-color: var(--azul-vivo); }
  .btn-status.active { background: var(--azul-profundo); border-color: var(--azul-profundo); color: white; }

  /* Lista de frases (opções clicáveis) */
  .lista-opcoes {
    background: #ffffff;
    border: 1px solid #e2edf7;
    border-radius: 18px;
    padding: 10px;
    max-height: 260px;
    overflow-y: auto;
    margin-bottom: 18px;
    display: flex;
    flex-direction: column;
    gap: 7px;
  }
  .opcao {
    padding: 10px 14px;
    background: #f8fafc;
    border-radius: 14px;
    font-size: 0.85rem;
    line-height: 1.45;
    cursor: pointer;
    border-left: 3px solid transparent;
  }
  .opcao:hover { background: var(--azul-suave); border-left-color: var(--azul-vivo); }
  .opcao.selecionado { background: #e0f2e9; border-left-color: var(--verde-destaque); font-weight: 500; }

  .btn-limpar {
    background: transparent;
    border: 1px solid #e2e8f0;
    border-radius: 40px;
    padding: 5px 14px;
    font-size: 0.7rem;
    font-weight: 500;
    color: #5b6e8c;
    cursor: pointer;
    float: right;
    margin-bottom: 12px;
  }
  .btn-limpar:hover { background: #fee2e2; border-color: #f87171; color: #b91c1c; }
  .char-count { text-align: right; font-size: 0.7rem; color: var(--cinza-apoio); margin-top: 5px; }

  /* Texto que será exibido no Word (oculto na tela) */
  .print-text { display: none; white-space: pre-wrap; }

  /* Botões flutuantes: apenas Word e E-mail */
  .acoes-flutuantes {
    position: fixed;
    bottom: 28px;
    right: 28px;
    display: flex;
    gap: 16px;
    z-index: 1000;
  }
  .btn-acao {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 28px;
    border: none;
    border-radius: 60px;
    font-weight: 700;
    font-size: 0.9rem;
    color: white;
    cursor: pointer;
    box-shadow: 0 12px 22px rgba(0, 0, 0, 0.2);
    transition: transform 0.2s;
  }
  .btn-acao:hover { transform: translateY(-3px); }
  .btn-word { background: linear-gradient(135deg, #2b5797, #1e3c72); }
  .btn-email { background: linear-gradient(135deg, #2c7da0, #1f5068); }

  @media print {
    .no-print, .acoes-flutuantes, #toast, #progressBar { display: none !important; }
    .container { padding: 0; background: white; }
    textarea, .btn-group, .lista-opcoes, .btn-limpar, .char-count { display: none !important; }
    .print-text { display: block !important; }
  }
  @media (max-width: 680px) {
    .container { padding: 18px; }
    .acoes-flutuantes { flex-direction: column; gap: 12px; bottom: 20px; right: 16px; }
    .btn-acao { padding: 12px 22px; font-size: 0.8rem; }
  }
</style>
</head>

<div id="progressBar"></div>

<div class="container" id="conteudo">

  <div class="header-grid">

    <div><label>✉️ E-mail destino</label><input type="email" id="emailDestino" placeholder="destinatario@exemplo.com"></div>
  </div>

  <div id="formulario"></div>
</div>

<div class="acoes-flutuantes no-print">
  <button class="btn-acao btn-word" onclick="gerarWord()">📥 Baixar Word</button>
  <button class="btn-acao btn-email" onclick="enviarPorEmail()">✉️ Enviar por E-mail</button>
</div>

  // ---------- Geração dinâmica do formulário com base nas perguntas ----------
  function gerarFormulario() {
    const container = document.getElementById('formulario');
    container.innerHTML = '';
    perguntas.forEach((p, idx) => {
      const subtituloHtml = p.subtitulo ? `<p class="subtitulo no-print">${p.subtitulo}</p>` : '';
      let botoesHtml = '';
      for (let [chave, valor] of Object.entries(p.banco)) {
        botoesHtml += `<button class="btn-status no-print" onclick="mostrarOpcoes(${idx},'${chave}',this)">${valor.titulo}</button>`;
      }
      const secao = `
        <div class="section" id="sec-${idx}">
          <h2>${p.titulo}</h2>
          ${subtituloHtml}
          <div class="btn-group no-print">${botoesHtml}</div>
          <div id="lista-${idx}" class="lista-opcoes no-print" style="display:none;"></div>
          <div style="overflow:auto; margin-bottom:6px;">
            <button class="btn-limpar no-print" onclick="limparSecao(${idx})">🗑️ Limpar seção</button>
          </div>
          <div class="textarea-wrap no-print">
            <textarea id="texto-${idx}" placeholder="📝 Registre suas evidências (clique nas frases ou escreva diretamente)... " oninput="syncText(${idx})"></textarea>
            <div class="char-count" id="cc-${idx}">0 caracteres</div>
          </div>
          <div id="print-${idx}" class="print-text"></div>
        </div>
      `;
      container.insertAdjacentHTML('beforeend', secao);
    });
    atualizarProgresso();
  }

  // Exibe lista de frases da opção clicada
  function mostrarOpcoes(pIdx, chave, btn) {
    const listaDiv = document.getElementById(`lista-${pIdx}`);
    const grupo = btn.closest('.btn-group');
    const botoes = grupo.querySelectorAll('.btn-status');
    const jaAtivo = btn.classList.contains('active');
    botoes.forEach(b => b.classList.remove('active'));
    if (jaAtivo) {
      listaDiv.style.display = 'none';
      return;
    }
    btn.classList.add('active');
    listaDiv.style.display = 'flex';
    listaDiv.innerHTML = '';
    const frasesArray = perguntas[pIdx].banco[chave].frases;
    const textareaAtual = document.getElementById(`texto-${pIdx}`);
    frasesArray.forEach(frase => {
      const divOp = document.createElement('div');
      divOp.className = 'opcao';
      divOp.innerText = frase;
      if (textareaAtual.value.includes(frase)) divOp.classList.add('selecionado');
      divOp.onclick = () => toggleFrase(pIdx, frase, divOp);
      listaDiv.appendChild(divOp);
    });
  }

  // Adiciona ou remove frase do textarea
  function toggleFrase(pIdx, frase, elementoOpcao) {
    const ta = document.getElementById(`texto-${pIdx}`);
    if (ta.value.includes(frase)) {
      const linhas = ta.value.split(/\r?\n/);
      const novasLinhas = linhas.filter(linha => !linha.includes(frase));
      ta.value = novasLinhas.join('\n').replace(/^\s*\n/, '');
      elementoOpcao.classList.remove('selecionado');
    } else {
      ta.value += (ta.value ? '\n' : '') + '• ' + frase;
      elementoOpcao.classList.add('selecionado');
    }
    syncText(pIdx);
  }

  function limparSecao(idx) {
    const ta = document.getElementById(`texto-${idx}`);
    if (ta) ta.value = '';
    document.getElementById(`print-${idx}`).innerText = '';
    document.getElementById(`cc-${idx}`).textContent = '0 caracteres';
    const listaDiv = document.getElementById(`lista-${idx}`);
    if (listaDiv) {
      listaDiv.querySelectorAll('.opcao').forEach(op => op.classList.remove('selecionado'));
      listaDiv.style.display = 'none';
    }
    const secao = document.getElementById(`sec-${idx}`);
    if (secao) {
      secao.querySelectorAll('.btn-status').forEach(btn => btn.classList.remove('active'));
    }
    atualizarProgresso();
  }

  function syncText(idx) {
    const val = document.getElementById(`texto-${idx}`).value;
    document.getElementById(`print-${idx}`).innerText = val;
    document.getElementById(`cc-${idx}`).textContent = val.length + ' caracteres';
    atualizarProgresso();
  }

  function atualizarProgresso() {
    let preenchidas = 0;
    perguntas.forEach((_, i) => {
      const txt = document.getElementById(`texto-${i}`);
      if (txt && txt.value.trim().length > 0) preenchidas++;
    });
    const percent = (preenchidas / perguntas.length) * 100;
    document.getElementById('progressBar').style.width = percent + '%';
  }

  // Obtém os dados do cabeçalho
  function obterCabecalho() {
    return {
      data: document.getElementById('data').value || '—',
      escola: document.getElementById('escola').value || '—',
      professor: document.getElementById('professor').value || '—',
      componente: document.getElementById('componente').value || '—',
      turma: document.getElementById('turma').value || '—',
      email: document.getElementById('emailDestino').value.trim()
    };
  }

  // Gera o HTML completo do relatório para o Word (com formatação)
  function gerarHTMLRelatorio() {
    const cab = obterCabecalho();
    let corpoHtml = '';
    perguntas.forEach((p, i) => {
      const texto = document.getElementById(`texto-${i}`).value.trim();
      if (!texto) return;
      corpoHtml += `
        <div style="margin-top:28px; page-break-inside:avoid;">
          <h2 style="color:#1e3c72; font-size:1rem; border-left:4px solid #2a5298; padding-left:12px;">${p.titulo}</h2>
          <div style="background:#fafcff; padding:12px 18px; border-radius:12px; border:1px solid #e2e8f0; white-space:pre-line;">
            ${texto.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}
          </div>
        </div>
      `;
    });
    return `
      <div style="font-family:'Segoe UI',Arial,sans-serif; max-width:1000px; margin:0 auto; padding:24px;">
        <h1 style="text-align:center; color:#1e3c72;">RELATÓRIO DE OBSERVAÇÃO DE AULA</h1>
        <div style="background:#f1f5f9; padding:16px; border-radius:16px; margin:20px 0;">
          <div><strong>📅 Data:</strong> ${cab.data}</div>
          <div><strong>🏫 Escola:</strong> ${cab.escola}</div>
          <div><strong>👨‍🏫 Professor:</strong> ${cab.professor}</div>
          <div><strong>📚 Componente:</strong> ${cab.componente}</div>
          <div><strong>👥 Turma:</strong> ${cab.turma}</div>
        </div>
        ${corpoHtml || '<p style="text-align:center;">Nenhuma observação registrada.</p>'}
      </div>
    `;
  }

  // Gera versão em texto puro para o corpo do e-mail
  function gerarTextoRelatorio() {
    const cab = obterCabecalho();
    let corpo = `RELATÓRIO DE OBSERVAÇÃO DE AULA\n\n`;
    corpo += `Data: ${cab.data}\nEscola: ${cab.escola}\nProfessor(a): ${cab.professor}\nComponente: ${cab.componente}\nTurma: ${cab.turma}\n\n`;
    corpo += `==========================================\n`;
    perguntas.forEach((p, i) => {
      const texto = document.getElementById(`texto-${i}`).value.trim();
      if (texto) {
        corpo += `\n▶ ${p.titulo}\n${texto}\n`;
      }
    });
    corpo += `\n--- Relatório gerado automaticamente ---\n`;
    return corpo;
  }

  // Exportar para Microsoft Word (.doc)
  function gerarWord() {
    const cab = obterCabecalho();
    const nomeArq = `Relatorio_${cab.professor.replace(/\s+/g, '_')}.doc`;
    const htmlCompleto = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Relatório de Observação</title><style>body{font-family:Calibri, 'Segoe UI', Arial; padding:30px;} h2{color:#1e3c72;}</style></head><body>${gerarHTMLRelatorio()}</body></html>`;
    const blob = new Blob(['\ufeff' + htmlCompleto], { type: 'application/msword' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = nomeArq;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(link.href);
    mostrarToast('📄 Arquivo Word gerado com sucesso!');
  }

  // Enviar por e-mail via protocolo mailto
  function enviarPorEmail() {
    const cab = obterCabecalho();
    let destinatario = cab.email;
    if (!destinatario) {
      mostrarToast('⚠️ Preencha o campo de e-mail destinatário.');
      return;
    }
    if (!destinatario.includes('@') || !destinatario.includes('.')) {
      mostrarToast('❌ Digite um e-mail válido (exemplo@dominio.com).');
      return;
    }
    const assunto = encodeURIComponent(`Relatório de Observação - ${cab.professor} - ${cab.data}`);
    const corpoTexto = gerarTextoRelatorio();
    const corpoEncoded = encodeURIComponent(corpoTexto);
    const mailtoLink = `mailto:${destinatario}?subject=${assunto}&body=${corpoEncoded}`;
    window.location.href = mailtoLink;
    mostrarToast(`📧 Abrindo cliente de e-mail para ${destinatario}. Envie após revisar.`);
  }

  function mostrarToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  // Inicialização
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('data').valueAsDate = new Date();
    gerarFormulario();
  });
</script>
