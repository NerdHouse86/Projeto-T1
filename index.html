<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Relatório de Observação de Aula | Envio por E-mail</title>
<!-- html2pdf bundle -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --azul-profundo: #1e3c72;
  --azul-vivo: #2a5298;
  --azul-suave: #e8f0fb;
  --verde-destaque: #28a745;
  --laranja-energia: #e67e22;
  --cinza-texto: #1e293b;
  --cinza-apoio: #64748b;
  --borda-clara: #dce7f5;
  --fundo-card: #ffffff;
  --fundo-geral: #eef2f7;
}

body {
  font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
  background: linear-gradient(145deg, #eef2f7 0%, #dee6f0 100%);
  min-height: 100vh;
  padding: 20px 16px 120px;
  color: var(--cinza-texto);
}

#progressBar {
  position: fixed;
  top: 0;
  left: 0;
  height: 5px;
  width: 0%;
  background: linear-gradient(90deg, var(--azul-vivo), #5b8dee, var(--laranja-energia));
  transition: width 0.35s ease;
  z-index: 10000;
  box-shadow: 0 0 3px rgba(0,0,0,0.2);
}

#overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(3px);
  z-index: 9999;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
}
#overlay.ativo { display: flex; }
.spinner {
  width: 58px; height: 58px;
  border: 6px solid rgba(255,255,255,0.35);
  border-top: 6px solid white;
  border-radius: 50%;
  animation: spin 0.9s cubic-bezier(0.4, 0, 0.2, 1) infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#overlay p { color: white; font-weight: 600; background: rgba(0,0,0,0.5); padding: 6px 18px; border-radius: 40px; }

#toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%) translateY(25px);
  background: #1e293b;
  color: white;
  padding: 12px 28px;
  border-radius: 50px;
  font-weight: 600;
  font-size: 0.9rem;
  opacity: 0;
  transition: all 0.3s ease;
  z-index: 9998;
  pointer-events: none;
  box-shadow: 0 12px 24px rgba(0,0,0,0.2);
  white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.container {
  max-width: 1180px;
  margin: 0 auto;
  background: var(--fundo-card);
  border-radius: 28px;
  padding: 32px 34px;
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
}

h1 {
  color: var(--azul-profundo);
  font-size: 1.8rem;
  font-weight: 700;
  border-left: 6px solid var(--azul-vivo);
  padding-left: 20px;
  margin-bottom: 28px;
  display: flex;
  align-items: center;
  gap: 12px;
}

h2 {
  font-size: 1.18rem;
  font-weight: 600;
  color: var(--azul-profundo);
  border-left: 5px solid var(--azul-vivo);
  padding-left: 14px;
  margin: 0 0 12px 0;
}

.header-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 18px;
  background: var(--azul-suave);
  padding: 24px 22px;
  border-radius: 20px;
  margin-bottom: 30px;
  border: 1px solid var(--borda-clara);
}
.header-grid label {
  font-weight: 700;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--azul-profundo);
  display: block;
  margin-bottom: 6px;
}
input, textarea {
  width: 100%;
  padding: 10px 14px;
  border: 1.5px solid var(--borda-clara);
  border-radius: 14px;
  font-size: 0.9rem;
  font-family: inherit;
  transition: all 0.2s;
  background: white;
}
input:focus, textarea:focus {
  border-color: var(--azul-vivo);
  outline: none;
  box-shadow: 0 0 0 3px rgba(42, 82, 152, 0.15);
}

.section {
  background: #fbfdff;
  border: 1px solid var(--borda-clara);
  border-radius: 24px;
  padding: 22px 26px;
  margin-top: 28px;
  transition: box-shadow 0.2s;
}
.subtitulo {
  font-size: 0.8rem;
  color: var(--cinza-apoio);
  margin: -5px 0 12px 0;
  font-style: italic;
}
.btn-group {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 18px;
}
.btn-status {
  background: #f1f5f9;
  border: 1.5px solid #cbd5e1;
  padding: 8px 20px;
  border-radius: 40px;
  font-size: 0.75rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  color: #1e293b;
}
.btn-status:hover { background: #e2e8f0; border-color: var(--azul-vivo); }
.btn-status.active { background: var(--azul-profundo); border-color: var(--azul-profundo); color: white; }

.lista-opcoes {
  background: #ffffff;
  border: 1px solid #e2edf7;
  border-radius: 18px;
  padding: 10px;
  max-height: 260px;
  overflow-y: auto;
  margin-bottom: 18px;
  display: flex;
  flex-direction: column;
  gap: 7px;
}
.opcao {
  padding: 10px 14px;
  background: #f8fafc;
  border-radius: 14px;
  font-size: 0.85rem;
  line-height: 1.45;
  cursor: pointer;
  border-left: 3px solid transparent;
}
.opcao:hover { background: var(--azul-suave); border-left-color: var(--azul-vivo); }
.opcao.selecionado { background: #e0f2e9; border-left-color: var(--verde-destaque); font-weight: 500; }

.btn-limpar {
  background: transparent;
  border: 1px solid #e2e8f0;
  border-radius: 40px;
  padding: 5px 14px;
  font-size: 0.7rem;
  font-weight: 500;
  color: #5b6e8c;
  cursor: pointer;
  float: right;
  margin-bottom: 12px;
}
.btn-limpar:hover { background: #fee2e2; border-color: #f87171; color: #b91c1c; }
.char-count { text-align: right; font-size: 0.7rem; color: var(--cinza-apoio); margin-top: 5px; }
.print-text { display: none; white-space: pre-wrap; font-size: 0.85rem; line-height: 1.6; }

.acoes-flutuantes {
  position: fixed;
  bottom: 28px;
  right: 28px;
  display: flex;
  gap: 16px;
  z-index: 1000;
}
.btn-acao {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 28px;
  border: none;
  border-radius: 60px;
  font-weight: 700;
  font-size: 0.9rem;
  color: white;
  cursor: pointer;
  box-shadow: 0 12px 22px rgba(0, 0, 0, 0.2);
  transition: all 0.2s ease;
}
.btn-acao:hover { transform: translateY(-3px); filter: brightness(1.02); }
.btn-pdf { background: linear-gradient(135deg, #e67e22, #d35400); }
.btn-word { background: linear-gradient(135deg, #2b5797, #1e3c72); }
.btn-email { background: linear-gradient(135deg, #2c7da0, #1f5068); }

@media print {
  .no-print, .acoes-flutuantes, #overlay, #toast, #progressBar { display: none !important; }
  .container { padding: 0; box-shadow: none; background: white; }
  .section { border: none; padding: 10px 0; break-inside: avoid; }
  textarea, .btn-group, .lista-opcoes, .btn-limpar, .char-count { display: none !important; }
  .print-text { display: block !important; }
}
@media (max-width: 680px) {
  .container { padding: 18px; }
  .acoes-flutuantes { flex-direction: column; gap: 12px; bottom: 20px; right: 16px; }
  .btn-acao { padding: 12px 22px; font-size: 0.8rem; }
}
</style>
</head>
<body>

<div id="progressBar"></div>
<div id="overlay"><div class="spinner"></div><p>Processando relatório, aguarde...</p></div>
<div id="toast"></div>

<div class="container" id="conteudo">
  <h1>📋 Relatório de Observação de Aula</h1>

  <div class="header-grid">
    <div><label>📅 Data</label><input type="date" id="data" value=""></div>
    <div><label>🏫 Escola</label><input type="text" id="escola" placeholder="Nome da escola"></div>
    <div><label>👨‍🏫 Professor</label><input type="text" id="professor" placeholder="Docente observado"></div>
    <div><label>📚 Componente</label><input type="text" id="componente" placeholder="Ex: Matemática"></div>
    <div><label>👥 Turma</label><input type="text" id="turma" placeholder="9° ano A"></div>
    <div><label>✉️ E-mail para envio</label><input type="email" id="emailDestino" placeholder="destinatario@exemplo.com" value=""></div>
  </div>

  <div id="formulario"></div>
</div>

<div class="acoes-flutuantes no-print">
  <button class="btn-acao btn-pdf" onclick="gerarPDF()">📄 Gerar PDF</button>
  <button class="btn-acao btn-word" onclick="gerarWord()">📥 Word</button>
  <button class="btn-acao btn-email" onclick="enviarPorEmail()">✉️ Enviar E-mail</button>
</div>

<script>
// ------------------------------------------------- BANCO DE PERGUNTAS COMPLETO -------------------------------------------------
const perguntas = [
  { titulo: "Objetivo de aprendizagem da aula:", banco: { op1: { titulo: "Ficou explícito para a turma", frases: ["O professor iniciou a aula apresentando de forma clara o objetivo de aprendizagem no quadro, explicando aos alunos o que seria desenvolvido e a importância daquele conteúdo para sua formação.","Logo no início, o docente explicitou o objetivo da aula em linguagem acessível, garantindo que os alunos compreendessem o que se esperava deles.","Durante a explicação inicial, o professor contextualizou o conteúdo e deixou evidente o objetivo, relacionando-o com conhecimentos prévios dos alunos.","Ao longo da aula, o docente retomou o objetivo em diferentes momentos, reforçando o foco da aprendizagem.","O professor utilizou perguntas direcionadas para verificar se os alunos compreendiam o objetivo proposto.","As atividades propostas foram sempre acompanhadas de explicações que as conectavam diretamente ao objetivo da aula."] }, op2: { titulo: "Ficou implícito ao longo das atividades", frases: ["Embora o objetivo não tenha sido explicitado verbalmente, as atividades propostas estavam alinhadas à aprendizagem esperada.","A sequência didática apresentou coerência, permitindo inferir claramente o objetivo da aula.","O professor conduziu a aula com progressão lógica, evidenciando domínio do conteúdo e intencionalidade pedagógica."] }, op3: { titulo: "Não ficou evidente", frases: ["O professor não apresentou o objetivo da aula, dificultando a compreensão dos alunos.","As atividades foram propostas sem explicitação de propósito, comprometendo o sentido da aprendizagem.","Não houve clareza quanto às expectativas de aprendizagem ao longo da aula."] } } },
  { titulo: "Recursos pedagógicos utilizados:", banco: { op1: { titulo: "Domínio pleno e adaptação", frases: ["O professor utilizou recursos digitais de forma intencional, articulando-os às estratégias metodológicas e realizando adaptações conforme as necessidades da turma.","Demonstrou domínio no uso da lousa digital, integrando-a à explicação e ajustando a abordagem diante das dúvidas dos alunos.","Ao perceber dificuldades, adaptou o uso dos recursos para garantir melhor compreensão dos alunos."] }, op2: { titulo: "Domínio técnico, mas pouca flexibilidade", frases: ["O professor demonstrou domínio técnico dos recursos, mas manteve a mesma abordagem mesmo diante de dificuldades.","Utilizou adequadamente a plataforma, porém sem realizar ajustes conforme as necessidades da turma."] }, op3: { titulo: "Uso mecanizado ou desconectado", frases: ["O professor utilizou recursos digitais sem conexão clara com o objetivo da aula.","O uso da tecnologia ocorreu de forma mecânica, sem intencionalidade pedagógica."] } } },
  { titulo: "Qualidade das explicações do professor:", banco: { op1: { titulo: "Segurança, exemplos e clareza", frases: ["O professor conduziu as explicações com clareza e segurança, utilizando exemplos variados e adequados ao nível da turma, além de responder prontamente às dúvidas.","Demonstrou domínio do conteúdo ao apresentar diferentes formas de explicação.","Utilizou exemplos contextualizados que facilitaram a compreensão."] }, op2: { titulo: "Preparado, mas inseguro em dúvidas", frases: ["O professor demonstrou conhecimento do conteúdo, porém apresentou dificuldades ao responder dúvidas mais específicas.","Conduziu a explicação de forma adequada, mas com limitações ao aprofundar conceitos."] }, op3: { titulo: "Inseguro / confuso", frases: ["O professor apresentou dificuldades na explicação do conteúdo, demonstrando insegurança.","As explicações foram superficiais e pouco claras para os alunos."] } } },
  { titulo: "Verificação da aprendizagem:", banco: { op1: { titulo: "Estratégias diversificadas", frases: ["O professor utilizou perguntas direcionadas ao longo da aula, solicitando que os alunos explicassem os conceitos.","Circulou pela sala, observando as produções e intervindo quando necessário.","Propôs momentos em que os alunos deveriam explicar oralmente o que estavam aprendendo."] }, op2: { titulo: "Perguntas genéricas (Entenderam?)", frases: ["O professor realizou verificações pontuais por meio de perguntas genéricas como 'entenderam?', sem aprofundar as respostas.","As verificações ocorreram de forma superficial, sem evidências concretas."] }, op3: { titulo: "Não verificou", frases: ["O professor não realizou nenhum tipo de verificação da aprendizagem ao longo da aula.","Não houve perguntas ou intervenções para avaliar o entendimento da turma."] }, op4: { titulo: "Não foi possível observar", frases: ["Não foi possível identificar momentos claros de verificação da aprendizagem durante o período observado."] } } },
  { titulo: "Ajuste do ritmo conforme os estudantes:", banco: { op1: { titulo: "Ajustou o ritmo conforme dificuldades", frases: ["O professor ajustou o tempo das atividades ao perceber dificuldades, dedicando mais tempo à explicação.","Ao identificar dúvidas recorrentes, retomou a explicação utilizando uma abordagem diferente."] }, op2: { titulo: "Manteve o mesmo ritmo sem ajustes", frases: ["O professor seguiu o planejamento inicial sem realizar ajustes diante das dificuldades.","Manteve o ritmo da aula mesmo com sinais de incompreensão."] }, op3: { titulo: "Não foi possível observar", frases: ["Não foi possível identificar ajustes no ritmo durante o período observado."] } } },
  { titulo: "Organização da aula (começo, meio, fim):", banco: { op1: { titulo: "Estruturada com tempo para sistematização", frases: ["O docente iniciou contextualizando o tema e encerrou com um mapa mental construído com a turma.","Houve transição suave entre a explicação teórica e a prática, com correção coletiva."] }, op2: { titulo: "Estruturada, mas atividades apressadas", frases: ["O professor explicou o conteúdo rapidamente para garantir tempo do exercício.","Os alunos mal terminaram a leitura quando o docente já iniciou a correção."] }, op3: { titulo: "Sem sistematização/conclusão", frases: ["Os alunos terminaram os exercícios e ficaram ociosos, sem um fechamento do docente.","Não houve um momento para discutir os erros e acertos."] }, op4: { titulo: "Tempo insuficiente para finalizar", frases: ["O conteúdo proposto era extenso demais para o tempo disponível, resultando em aula incompleta.","As atividades foram interrompidas pelo sinal antes de serem finalizadas."] } } },
  { titulo: "Envolvimento e gestão da turma:", subtitulo: "Durante a maior parte da aula, quantos estudantes estavam engajados?", banco: { op1: { titulo: "Nenhum estudante", frases: ["O professor falava de costas enquanto todos os estudantes conversavam sobre temas alheios.","Ao propor a atividade, nenhum aluno abriu o caderno ou material digital."] }, op2: { titulo: "Poucos estudantes", frases: ["Apenas os três estudantes da primeira fila faziam anotações e respondiam.","Houve participação apenas quando o professor chamava nomes específicos."] }, op3: { titulo: "Cerca de metade da turma", frases: ["Metade da sala realizou a atividade com autonomia, enquanto a outra metade estava dispersa.","O professor conseguiu manter controle, mas o interesse estava dividido."] }, op4: { titulo: "Todos ou quase todos", frases: ["Todos os estudantes estavam com os materiais abertos e seguiam a leitura orientada.","A turma inteira participou ativamente, com contribuições variadas."] } } },
  { titulo: "Pontos Positivos:", banco: { op1: { titulo: "Clique para selecionar", frases: ["Excelente organização do tempo e ritmo.","Clareza na explicação e uso de exemplos relevantes.","Boa interação com os estudantes, estímulo à participação.","Estratégias diversificadas de ensino.","Domínio do conteúdo e condução segura da aula.","Planejamento coerente com objetivos claros.","Uso eficiente de recursos tecnológicos.","Promoção de ambiente respeitoso e colaborativo."] } } },
  { titulo: "Pontos de Atenção / Recomendações:", banco: { op1: { titulo: "Clique para selecionar", frases: ["Aprimorar a gestão do tempo para garantir sistematização.","Aprofundar a verificação da compreensão (evitar perguntas genéricas).","Diversificar estratégias para engajar mais alunos.","Fazer ajustes no ritmo conforme dificuldades da turma.","Utilizar exemplos mais próximos da realidade dos estudantes.","Planejar retomadas conceituais e fechamento consistente.","Reforçar a explicitação dos objetivos de aprendizagem."] } } }
];

// Geração do formulário
function gerarFormulario() {
  const container = document.getElementById('formulario');
  container.innerHTML = '';
  perguntas.forEach((p, idx) => {
    const subtituloHtml = p.subtitulo ? `<p class="subtitulo no-print">${p.subtitulo}</p>` : '';
    let botoesHtml = '';
    for (let [chave, valor] of Object.entries(p.banco)) {
      botoesHtml += `<button class="btn-status no-print" data-sec="${idx}" data-opcao="${chave}" onclick="mostrarOpcoes(${idx},'${chave}',this)">${valor.titulo}</button>`;
    }
    const secao = `
      <div class="section" id="sec-${idx}">
        <h2>${p.titulo}</h2>
        ${subtituloHtml}
        <div class="btn-group no-print">${botoesHtml}</div>
        <div id="lista-${idx}" class="lista-opcoes no-print" style="display:none;"></div>
        <div style="overflow:auto; margin-bottom:6px;">
          <button class="btn-limpar no-print" onclick="limparSecao(${idx})">🗑️ Limpar seção</button>
        </div>
        <div class="textarea-wrap no-print">
          <textarea id="texto-${idx}" placeholder="📝 Registre suas evidências aqui (clique nas frases acima ou escreva livremente)... " oninput="syncText(${idx})"></textarea>
          <div class="char-count" id="cc-${idx}">0 caracteres</div>
        </div>
        <div id="print-${idx}" class="print-text"></div>
      </div>
    `;
    container.insertAdjacentHTML('beforeend', secao);
  });
  atualizarProgresso();
}

function mostrarOpcoes(pIdx, chave, btn) {
  const listaDiv = document.getElementById(`lista-${pIdx}`);
  const grupo = btn.closest('.btn-group');
  const botoes = grupo.querySelectorAll('.btn-status');
  const jaAtivo = btn.classList.contains('active');
  botoes.forEach(b => b.classList.remove('active'));
  if (jaAtivo) { listaDiv.style.display = 'none'; return; }
  btn.classList.add('active');
  listaDiv.style.display = 'flex';
  listaDiv.innerHTML = '';
  const frasesArray = perguntas[pIdx].banco[chave].frases;
  const textareaAtual = document.getElementById(`texto-${pIdx}`);
  frasesArray.forEach(frase => {
    const divOp = document.createElement('div');
    divOp.className = 'opcao';
    divOp.innerText = frase;
    if (textareaAtual.value.includes(frase)) divOp.classList.add('selecionado');
    divOp.onclick = () => toggleFrase(pIdx, frase, divOp);
    listaDiv.appendChild(divOp);
  });
}

function toggleFrase(pIdx, frase, elementoOpcao) {
  const ta = document.getElementById(`texto-${pIdx}`);
  if (ta.value.includes(frase)) {
    const linhas = ta.value.split(/\r?\n/);
    const novasLinhas = linhas.filter(linha => !linha.includes(frase));
    ta.value = novasLinhas.join('\n').replace(/^\s*\n/, '');
    elementoOpcao.classList.remove('selecionado');
  } else {
    ta.value += (ta.value ? '\n' : '') + '• ' + frase;
    elementoOpcao.classList.add('selecionado');
  }
  syncText(pIdx);
}

function limparSecao(idx) {
  const ta = document.getElementById(`texto-${idx}`);
  if (ta) ta.value = '';
  const printDiv = document.getElementById(`print-${idx}`);
  if (printDiv) printDiv.innerText = '';
  const cc = document.getElementById(`cc-${idx}`);
  if (cc) cc.textContent = '0 caracteres';
  const listaDiv = document.getElementById(`lista-${idx}`);
  if (listaDiv) listaDiv.querySelectorAll('.opcao').forEach(op => op.classList.remove('selecionado'));
  const secao = document.getElementById(`sec-${idx}`);
  if (secao) {
    secao.querySelectorAll('.btn-status').forEach(btn => btn.classList.remove('active'));
    if (listaDiv) listaDiv.style.display = 'none';
  }
  atualizarProgresso();
}

function syncText(idx) {
  const val = document.getElementById(`texto-${idx}`).value;
  document.getElementById(`print-${idx}`).innerText = val;
  document.getElementById(`cc-${idx}`).textContent = val.length + ' caracteres';
  atualizarProgresso();
}

function atualizarProgresso() {
  let preenchidas = 0;
  perguntas.forEach((_, i) => {
    const txt = document.getElementById(`texto-${i}`);
    if (txt && txt.value.trim().length > 0) preenchidas++;
  });
  document.getElementById('progressBar').style.width = ((preenchidas / perguntas.length) * 100) + '%';
}

function obterCabecalho() {
  return {
    data: document.getElementById('data').value || '—',
    escola: document.getElementById('escola').value || '—',
    professor: document.getElementById('professor').value || '—',
    componente: document.getElementById('componente').value || '—',
    turma: document.getElementById('turma').value || '—',
    email: document.getElementById('emailDestino').value.trim()
  };
}

// Gera HTML completo do relatório para PDF (clone tratado)
function gerarCloneRelatorioParaPDF() {
  // clona o container principal
  const original = document.getElementById('conteudo');
  const clone = original.cloneNode(true);
  // remove todos os elementos .no-print (botões, grupos, textareas, etc)
  clone.querySelectorAll('.no-print').forEach(el => el.remove());
  // esconde elementos que podem atrapalhar (mas já foram removidos)
  // substitui cada .print-text pelo seu conteúdo visível
  clone.querySelectorAll('.print-text').forEach(el => {
    // o .print-text contém o texto puro do relatório da seção, mas como o textarea foi removido, garantimos que o conteúdo já está sincronizado
    // tornamos o print-text visível e com estilo adequado
    el.style.display = 'block';
    el.style.marginBottom = '16px';
    el.style.backgroundColor = '#fafcff';
    el.style.padding = '12px 16px';
    el.style.borderRadius = '12px';
    el.style.border = '1px solid #e2e8f0';
    el.style.fontSize = '0.85rem';
    el.style.lineHeight = '1.6';
  });
  // ajusta os inputs do cabeçalho para mostrar apenas os valores (substitui input por texto)
  clone.querySelectorAll('.header-grid input').forEach(input => {
    const valor = input.value;
    const span = document.createElement('span');
    span.className = 'print-value';
    span.innerText = valor || '—';
    span.style.fontWeight = '500';
    span.style.display = 'inline-block';
    span.style.padding = '4px 0';
    input.parentNode.replaceChild(span, input);
  });
  // remove qualquer elemento remanescente com classe no-print (caso algum escape)
  clone.querySelectorAll('.no-print').forEach(el => el.remove());
  // ajusta margens e estilo para impressão
  clone.style.padding = '20px';
  clone.style.maxWidth = '100%';
  clone.style.backgroundColor = 'white';
  clone.style.boxShadow = 'none';
  clone.style.borderRadius = '0';
  return clone;
}

async function gerarPDF() {
  const overlay = document.getElementById('overlay');
  overlay.classList.add('ativo');
  try {
    const cloneRelatorio = gerarCloneRelatorioParaPDF();
    // cria um container temporário visível, mas fora da tela para não atrapalhar
    const tempDiv = document.createElement('div');
    tempDiv.style.position = 'absolute';
    tempDiv.style.top = '-10000px';
    tempDiv.style.left = '0';
    tempDiv.style.width = '210mm';
    tempDiv.style.backgroundColor = 'white';
    tempDiv.style.zIndex = '-1';
    tempDiv.appendChild(cloneRelatorio);
    document.body.appendChild(tempDiv);
    
    const cab = obterCabecalho();
    const nomeProfessor = (cab.professor !== '—' ? cab.professor : 'relatorio').replace(/\s+/g, '_');
    const opt = {
      margin: [12, 12, 12, 12],
      filename: `Observacao_${nomeProfessor}.pdf`,
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: { scale: 2, letterRendering: true, useCORS: true },
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };
    await html2pdf().set(opt).from(tempDiv).save();
    mostrarToast('✅ PDF gerado com sucesso!');
    document.body.removeChild(tempDiv);
  } catch (err) {
    console.error(err);
    alert('Erro ao gerar PDF. Verifique o console.');
  } finally {
    overlay.classList.remove('ativo');
  }
}

function gerarWord() {
  const cab = obterCabecalho();
  const nomeArq = `Relatorio_${cab.professor.replace(/\s+/g, '_')}.doc`;
  const htmlCompleto = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Relatório de Observação</title><style>body{font-family:Calibri, 'Segoe UI', Arial; padding:30px;} h2{color:#1e3c72;}</style></head><body>${gerarHTMLRelatorio()}</body></html>`;
  const blob = new Blob(['\ufeff' + htmlCompleto], { type: 'application/msword' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = nomeArq;
  document.body.appendChild(link); link.click(); document.body.removeChild(link);
  URL.revokeObjectURL(link.href);
  mostrarToast('📄 Arquivo Word baixado!');
}

function gerarHTMLRelatorio() {
  const cab = obterCabecalho();
  let corpoHtml = '';
  perguntas.forEach((p, i) => {
    const texto = document.getElementById(`texto-${i}`).value.trim();
    if (!texto) return;
    corpoHtml += `<div style="margin-top:28px; page-break-inside:avoid;"><h2 style="color:#1e3c72; font-size:1rem; border-left:4px solid #2a5298; padding-left:12px;">${p.titulo}</h2><div style="background:#fafcff; padding:12px 18px; border-radius:12px; border:1px solid #e2e8f0; white-space:pre-line;">${texto.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}</div></div>`;
  });
  return `<div style="font-family:'Segoe UI',Arial,sans-serif; max-width:1000px; margin:0 auto; padding:24px;"><h1 style="text-align:center; color:#1e3c72;">RELATÓRIO DE OBSERVAÇÃO DE AULA</h1><div style="background:#f1f5f9; padding:16px; border-radius:16px; margin:20px 0;"><div><strong>📅 Data:</strong> ${cab.data}</div><div><strong>🏫 Escola:</strong> ${cab.escola}</div><div><strong>👨‍🏫 Professor:</strong> ${cab.professor}</div><div><strong>📚 Componente:</strong> ${cab.componente}</div><div><strong>👥 Turma:</strong> ${cab.turma}</div></div>${corpoHtml || '<p style="text-align:center;">Nenhuma observação registrada.</p>'}</div>`;
}

function gerarTextoRelatorio() {
  const cab = obterCabecalho();
  let corpo = `RELATÓRIO DE OBSERVAÇÃO DE AULA\n\n`;
  corpo += `Data: ${cab.data}\nEscola: ${cab.escola}\nProfessor(a): ${cab.professor}\nComponente: ${cab.componente}\nTurma: ${cab.turma}\n\n`;
  corpo += `==========================================\n`;
  perguntas.forEach((p, i) => {
    const texto = document.getElementById(`texto-${i}`).value.trim();
    if (texto) {
      corpo += `\n▶ ${p.titulo}\n${texto}\n`;
    }
  });
  corpo += `\n--- Relatório gerado automaticamente ---\n`;
  return corpo;
}

function enviarPorEmail() {
  const cab = obterCabecalho();
  let destinatario = cab.email;
  if (!destinatario) {
    mostrarToast('⚠️ Preencha o campo de e-mail destinatário.');
    return;
  }
  if (!destinatario.includes('@') || !destinatario.includes('.')) {
    mostrarToast('❌ Digite um e-mail válido (exemplo@dominio.com).');
    return;
  }
  const assunto = encodeURIComponent(`Relatório de Observação - ${cab.professor} - ${cab.data}`);
  const corpoTexto = gerarTextoRelatorio();
  const corpoEncoded = encodeURIComponent(corpoTexto);
  const mailtoLink = `mailto:${destinatario}?subject=${assunto}&body=${corpoEncoded}`;
  window.location.href = mailtoLink;
  mostrarToast(`📧 Abrindo cliente de e-mail para ${destinatario}. Envie após revisar.`);
}

function mostrarToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('data').valueAsDate = new Date();
  gerarFormulario();
});
</script>
